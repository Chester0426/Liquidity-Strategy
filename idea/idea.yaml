# --- Pages ---
# List every page in the app. Claude will create exactly these pages, no more.
# "landing" is required — it's your home page.
# The "name" becomes the URL route (e.g., name: dashboard → /dashboard, name: invoice-create → /invoice-create).
# "landing" is special — it maps to / (the root page).
pages:
  - name: landing
    purpose: Homepage introducing the LQST protocol rules, ST mechanism, LP-backed yield model, and entry point to the app

  - name: create
    purpose: Deploy a ST token smart contract (fee required) — auto-fetch token data from CoinGecko or Pump.fun, user fills in name and description

  - name: explore
    purpose: List all created ST tokens with price, market cap, and 24h volume

  - name: token/[id]
    purpose: Individual token page — price chart, buy/sell interface, token description and treasury asset data

  - name: revenue
    purpose: LQST platform revenue dashboard — protocol fees, buyback history, and treasury info






# --- Features ---
# List up to ~5 features. Each is a short description of one capability.
features:
  - Solana wallet connection — connect Phantom, Solflare, or Backpack to authenticate and interact with the protocol
  - High-fee DEX — generate significant protocol revenue through trading fees
  - Treasury LP creation — build protocol-owned liquidity via ORCA or JUP aggregator DEX integration
  - Fee distribution and buyback system — distribute protocol fees and execute token buybacks
  - Built-in Pump-style trading interface — native token launch and swap UI
  - Universal token support — compatible with mainstream and MEME tokens



# --- Success Metric ---
primary_metric: "Total trading volume on the platform"
target_value: "$500,000 trading volume"
measurement_window: "30 days"

# --- Stack ---
# Each value maps to a stack file at .claude/stacks/<category>/<value>.md
# To use a different technology, change the value and ensure the stack file exists.
# If no stack file exists, Claude will use its knowledge of that technology.
# Defaults below work for most experiments. Only change if you have a specific reason.
stack:
  framework: nextjs        # Web framework — leave default
  hosting: vercel           # Where the app is deployed — leave default
  database: supabase        # Database and backend — leave default
  auth: supabase            # Login/signup system — leave default
  analytics: posthog        # Usage tracking — leave default
  ui: shadcn                # UI component library — leave default
  # payment: stripe         # Uncomment if your experiment involves payments
  # email: resend            # Uncomment for welcome email + activation nudge
  testing: playwright      # Page-load smoke tests — created by bootstrap

# --- Deploy ---
deploy:
  vercel_team: "Magpiexyz Ltd"
  supabase_org: "Magpiexyz Labs"
  supabase_region: us-east-1
