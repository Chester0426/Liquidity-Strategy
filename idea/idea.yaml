# idea.yaml — Describe your MVP experiment
#
# Fill in every field below. Claude Code reads this file to decide what to build.
# See idea/idea.example.yaml for a complete worked example.
#
# HOW TO FILL THIS IN:
# 1. Replace every "TODO" value with your actual content
# 2. Keep the YAML structure as-is — don't rename keys or change indentation
# 3. When you're done, open Claude Code and run: /bootstrap

# --- Identity ---
name: liquidity-strategy    # Lowercase slug, hyphens only (e.g., "quick-bill"). Used in analytics.
title: LQST — Liquidity Strategy  # Human-readable title (e.g., "QuickBill — Fast Invoicing for Freelancers")
owner: Chester              # Your name or handle (e.g., "sarah"). Used in analytics.
template_repo: magpiexyz-lab/mvp-template  # GitHub repo where retro feedback is filed

# --- Problem & Solution ---
problem: |
  Non-yield-bearing tokens cannot participate in the AeroST token model.



solution: |
  Replace vault-held assets with LP positions on ORCA or an in-house DEX,
  using market-making fees as the protocol's base yield. This removes the
  VE-model restriction — almost any token, including high-volatility MEME
  tokens, can participate in the ST mechanism. The protocol also generates
  permanently locked, protocol-owned liquidity as a structural benefit.



target_user: "Meme token communities and speculative DeFi yield seekers"

distribution: |
  Partner with high-market-cap community tokens or specific Meme token
  communities for co-launches. Enter Pump Hackathon as the primary
  go-to-market channel, with PumpST as the flagship product under LQST.
  Two tokens will be issued: LQST (platform token) and PumpST (flagship
  product). Operations will run under the NFTST model.



